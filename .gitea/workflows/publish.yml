name: Build and Publish npm Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: linux
    steps:
      - name: Checkout
        run: |
          git clone "${{ github.server_url }}/${{ github.repository }}.git" .
          git checkout ${{ github.sha }}

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure Gitea npm registry
        run: |
          cat > ~/.npmrc <<EOF
          @ai-manifests:registry=https://git.marketally.com/api/packages/ai-manifests/npm/
          //git.marketally.com/api/packages/ai-manifests/npm/:_authToken=${{ secrets.GITEATOKEN }}
          EOF

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build all workspaces
        run: npm run build

      # Both packages live in the same workspace and bump independently.
      # When only one bumped, the other returns 409 ("version already
      # exists") on publish — that's a no-op, not a failure. We invoke
      # npm publish plainly, capture its output, and treat 409 / "already
      # exists" as success while still failing loudly on every other
      # error class. This matches the Python publish step's posture and
      # the C# `--skip-duplicate` flag.
      - name: Publish @ai-manifests/adp-agent
        working-directory: packages/agent
        run: |
          set +e
          npm publish --access public 2>&1 | tee /tmp/npm-publish-agent.log
          STATUS=${PIPESTATUS[0]}
          if [ "$STATUS" -ne 0 ]; then
            if grep -qiE "E409|already exists|cannot publish over" /tmp/npm-publish-agent.log; then
              echo "::notice::adp-agent skipped: version already published"
              exit 0
            fi
            exit "$STATUS"
          fi

      - name: Publish @ai-manifests/adp-agent-anchor
        working-directory: packages/agent-anchor
        run: |
          set +e
          npm publish --access public 2>&1 | tee /tmp/npm-publish-anchor.log
          STATUS=${PIPESTATUS[0]}
          if [ "$STATUS" -ne 0 ]; then
            if grep -qiE "E409|already exists|cannot publish over" /tmp/npm-publish-anchor.log; then
              echo "::notice::adp-agent-anchor skipped: version already published"
              exit 0
            fi
            exit "$STATUS"
          fi
